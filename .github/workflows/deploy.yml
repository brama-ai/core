name: Deploy (k3s / Helm)

on:
  workflow_dispatch:
    inputs:
      services:
        description: "Optional: comma-separated services to rebuild. Use 'all' to rebuild all images."
        required: false
        default: ""
      helm_only:
        description: "Skip image build, run helm upgrade only"
        required: false
        default: "false"
        type: boolean
  push:
    branches:
      - main

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  detect-services:
    runs-on: ubuntu-latest
    outputs:
      services_csv: ${{ steps.detect.outputs.services_csv }}
      should_deploy: ${{ steps.detect.outputs.should_deploy }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changed deployable services
        id: detect
        shell: bash
        run: |
          set -euo pipefail

          INPUT_SERVICES="${{ github.event.inputs.services || '' }}"
          HELM_ONLY="${{ github.event.inputs.helm_only || 'false' }}"

          # If helm_only, skip image detection — just deploy
          if [[ "$HELM_ONLY" == "true" ]]; then
            echo "services_csv=" >> "$GITHUB_OUTPUT"
            echo "should_deploy=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Service → source directory mapping (relative to repo root)
          declare -A SERVICE_SOURCE=(
            [core]="brama-core/src"
            [knowledge-agent]="brama-agents/knowledge-agent"
            [hello-agent]="brama-agents/hello-agent"
            [wiki-agent]="brama-agents/wiki-agent"
            [news-maker-agent]="brama-agents/news-maker-agent"
            [dev-reporter-agent]="brama-agents/dev-reporter-agent"
            [dev-agent]="brama-agents/dev-agent"
          )

          declare -A SERVICE_DOCKER=(
            [core]="docker/brama-core"
            [knowledge-agent]="docker/knowledge-agent"
            [hello-agent]="docker/hello-agent"
            [wiki-agent]="docker/wiki-agent"
            [news-maker-agent]="docker/news-maker-agent"
            [dev-reporter-agent]="docker/dev-reporter-agent"
            [dev-agent]="docker/dev-agent"
          )

          ALL_SERVICES=(core knowledge-agent hello-agent wiki-agent news-maker-agent dev-reporter-agent dev-agent)

          if [[ -n "$INPUT_SERVICES" ]]; then
            if [[ "$INPUT_SERVICES" == "all" ]]; then
              CSV="$(IFS=,; echo "${ALL_SERVICES[*]}")"
              echo "services_csv=$CSV" >> "$GITHUB_OUTPUT"
            else
              echo "services_csv=$INPUT_SERVICES" >> "$GITHUB_OUTPUT"
            fi
            echo "should_deploy=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [[ "${{ github.event_name }}" == "push" ]]; then
            BASE_SHA="${{ github.event.before }}"
            HEAD_SHA="${{ github.sha }}"
          else
            BASE_SHA="$(git rev-list --max-count=1 HEAD~1)"
            HEAD_SHA="${{ github.sha }}"
          fi

          mapfile -t CHANGED < <(git diff --name-only "$BASE_SHA" "$HEAD_SHA")
          printf 'Changed files:\n%s\n' "${CHANGED[@]:-<none>}"

          build_all=false
          declare -A SERVICES=()

          for file in "${CHANGED[@]}"; do
            case "$file" in
              brama-core/deploy/charts/brama/*|.github/workflows/deploy.yml|brama-core/Makefile)
                build_all=true
                ;;
            esac

            for svc in "${ALL_SERVICES[@]}"; do
              src="${SERVICE_SOURCE[$svc]:-}"
              docker_dir="${SERVICE_DOCKER[$svc]:-}"
              if [[ -n "$src" && "$file" == "$src/"* ]]; then
                SERVICES["$svc"]=1
              fi
              if [[ -n "$docker_dir" && "$file" == "$docker_dir/"* ]]; then
                SERVICES["$svc"]=1
              fi
            done
          done

          if [[ "$build_all" == "true" ]]; then
            for svc in "${ALL_SERVICES[@]}"; do
              SERVICES["$svc"]=1
            done
          fi

          if [[ ${#SERVICES[@]} -eq 0 ]]; then
            echo "services_csv=" >> "$GITHUB_OUTPUT"
            echo "should_deploy=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          mapfile -t ORDERED < <(printf '%s\n' "${!SERVICES[@]}" | sort)
          CSV="$(IFS=,; echo "${ORDERED[*]}")"
          echo "services_csv=$CSV" >> "$GITHUB_OUTPUT"
          echo "should_deploy=true" >> "$GITHUB_OUTPUT"

  deploy:
    runs-on: ubuntu-latest
    needs: detect-services
    if: needs.detect-services.outputs.should_deploy == 'true'
    environment: production
    steps:
      - name: Setup SSH key
        shell: bash
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT || '22' }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p "$SSH_PORT" "$SSH_HOST" >> ~/.ssh/known_hosts

      - name: Deploy via Helm on k3s
        shell: bash
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT || '22' }}
          SSH_USER: ${{ secrets.SSH_USER }}
          APP_PATH: ${{ vars.APP_PATH }}
          TARGET_REF: ${{ github.ref_name }}
          SERVICES_CSV: ${{ needs.detect-services.outputs.services_csv }}
          KUBECONFIG: /etc/rancher/k3s/k3s.yaml
        run: |
          set -euo pipefail
          if [[ -z "${APP_PATH:-}" ]]; then
            APP_PATH="/root/app/brama-core"
          fi

          REMOTE_SERVICES="${SERVICES_CSV//,/ }"
          echo "Services to rebuild: ${REMOTE_SERVICES:-<none — helm upgrade only>}"

          ssh -p "$SSH_PORT" "$SSH_USER@$SSH_HOST" "
            set -euo pipefail
            export KUBECONFIG=/etc/rancher/k3s/k3s.yaml

            # Pull latest code
            cd '$APP_PATH'
            git fetch --all --prune
            if git show-ref --verify --quiet refs/remotes/origin/$TARGET_REF; then
              git checkout -B \"$TARGET_REF\" \"origin/$TARGET_REF\"
              git pull --ff-only origin \"$TARGET_REF\"
            else
              git checkout \"$TARGET_REF\"
              git pull --ff-only
            fi

            # Build and push changed images (if any)
            if [[ -n '${REMOTE_SERVICES}' ]]; then
              echo '==> Building images: ${REMOTE_SERVICES}'
              cd '$APP_PATH/..'
              bash brama-core/deploy/build-and-push.sh ${REMOTE_SERVICES}
              cd '$APP_PATH'
            fi

            # Helm upgrade
            echo '==> Running helm dependency update'
            helm dependency update ./deploy/charts/brama

            echo '==> Running helm upgrade --install'
            helm upgrade --install brama ./deploy/charts/brama \
              --namespace brama \
              --create-namespace \
              -f deploy/charts/brama/values-hetzner.yaml \
              --wait \
              --timeout 15m

            # Verify rollout
            echo '==> Checking rollout status'
            kubectl rollout status deploy/brama-core -n brama --timeout=120s
            kubectl get pods -n brama
          "
