parameters:
    app.opensearch_url: '%env(OPENSEARCH_URL)%'
    app.log_app_name: 'knowledge-agent'
    app.opensearch_index: '%env(OPENSEARCH_INDEX)%'
    app.rabbitmq_url: '%env(RABBITMQ_URL)%'
    app.litellm_base_url: '%env(LITELLM_BASE_URL)%'
    app.litellm_api_key: '%env(LITELLM_API_KEY)%'
    app.embedding_model: '%env(EMBEDDING_MODEL)%'
    app.internal_token: '%env(APP_INTERNAL_TOKEN)%'
    app.admin_public_url: '%env(ADMIN_PUBLIC_URL)%'
    app.worker_concurrency: '%env(int:KNOWLEDGE_WORKER_CONCURRENCY)%'
    app.rate_limit_max_tokens: '%env(int:KNOWLEDGE_RATE_LIMIT_MAX_TOKENS)%'
    app.rate_limit_refill_rate: '%env(int:KNOWLEDGE_RATE_LIMIT_REFILL_RATE)%'
    app.inspector_ingestion_key: '%env(INSPECTOR_INGESTION_KEY)%'
    app.inspector_transport: '%env(INSPECTOR_TRANSPORT)%'
    app.inspector_max_items: '%env(int:INSPECTOR_MAX_ITEMS)%'
    app.neuron_autoflush: '%env(bool:NEURON_AUTOFLUSH)%'

services:
    _defaults:
        autowire: true
        autoconfigure: true

    App\:
        resource: '../src/'
        exclude:
            - '../src/DependencyInjection/'
            - '../src/Kernel.php'

    App\OpenSearch\OpenSearchClientFactory:
        arguments:
            $opensearchUrl: '%app.opensearch_url%'

    OpenSearch\Client:
        factory: ['@App\OpenSearch\OpenSearchClientFactory', 'create']

    App\OpenSearch\OpenSearchIndexManager:
        arguments:
            $client: '@OpenSearch\Client'
            $indexName: '%app.opensearch_index%'

    App\OpenSearch\KnowledgeRepository:
        arguments:
            $client: '@OpenSearch\Client'
            $indexName: '%app.opensearch_index%'

    App\RabbitMQ\RabbitMQPublisher:
        arguments:
            $rabbitmqUrl: '%app.rabbitmq_url%'

    App\Workflow\KnowledgeExtractionAgent:
        arguments:
            $litellmBaseUrl: '%app.litellm_base_url%'
            $litellmApiKey: '%app.litellm_api_key%'
            $model: 'minimax/minimax-m2.5'
            $settingsRepository: '@App\Repository\SettingsRepository'

    App\Service\EmbeddingService:
        arguments:
            $litellmBaseUrl: '%app.litellm_base_url%'
            $litellmApiKey: '%app.litellm_api_key%'
            $embeddingModel: '%app.embedding_model%'

    App\Service\TokenBucketRateLimiter:
        arguments:
            $maxTokens: '%app.rate_limit_max_tokens%'
            $refillRate: '%app.rate_limit_refill_rate%'

    App\Command\KnowledgeWorkerCommand:
        arguments:
            $rabbitmqUrl: '%app.rabbitmq_url%'
            $concurrency: '%app.worker_concurrency%'
            $inspector: '@NeuronAI\Observability\InspectorObserver'
            $monitoring: '@App\Service\WorkflowMonitoringService'

    App\Controller\Api\UploadController:
        arguments:
            $internalToken: '%app.internal_token%'

    App\Controller\Api\EntriesController:
        arguments:
            $internalToken: '%app.internal_token%'

    App\Controller\Api\EntryController:
        arguments:
            $internalToken: '%app.internal_token%'

    App\Controller\Api\A2AController:
        arguments:
            $internalToken: '%app.internal_token%'

    App\Controller\Admin\KnowledgeAdminController:
        arguments:
            $internalToken: '%app.internal_token%'
            $rabbitmqUrl: '%app.rabbitmq_url%'

    App\Controller\Api\ManifestController:
        arguments:
            $adminPublicUrl: '%app.admin_public_url%'

    App\Controller\Api\OpenApiController:
        arguments:
            $projectDir: '%kernel.project_dir%'

    App\Controller\Api\Internal\MigrateController:
        arguments:
            $internalToken: '%app.internal_token%'
            $projectDir: '%kernel.project_dir%'

    App\Controller\Api\HealthController:
        arguments:
            $rabbitmqUrl: '%app.rabbitmq_url%'

    App\Logging\OpenSearchHandler:
        arguments:
            $opensearchUrl: '%app.opensearch_url%'

    App\Logging\OpenSearchProcessor:
        arguments:
            $appName: '%app.log_app_name%'
        tags:
            - { name: monolog.processor }

    # Inspector APM Factory
    App\Service\InspectorFactory:
        arguments:
            $inspectorKey: '%app.inspector_ingestion_key%'
            $transport: '%app.inspector_transport%'
            $maxItems: '%app.inspector_max_items%'
            $autoFlush: '%app.neuron_autoflush%'

    # Inspector APM Observer for workflow monitoring
    NeuronAI\Observability\InspectorObserver:
        factory: ['@App\Service\InspectorFactory', 'create']
