<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Dashboard</title>
    <style>
        body { font-family: sans-serif; padding: 2rem; background: #f5f5f5; }
        .header { display: flex; justify-content: space-between; align-items: center; background: #fff; padding: 1rem 1.5rem; border-radius: 6px; box-shadow: 0 2px 8px rgba(0,0,0,.08); margin-bottom: 1.5rem; }
        .header h1 { margin: 0; font-size: 1.3rem; }
        a { color: #333; font-size: .9rem; }
        .content { background: #fff; padding: 1.5rem; border-radius: 6px; box-shadow: 0 2px 8px rgba(0,0,0,.08); }
    </style>
</head>
<body>
    <div class="header">
        <h1>Admin Dashboard</h1>
        <a href="/admin/logout">Logout (admin)</a>
    </div>
    <div class="content">
        <p>Welcome, <strong>admin</strong>. You are logged in.</p>
    </div>
</body>
</html>
