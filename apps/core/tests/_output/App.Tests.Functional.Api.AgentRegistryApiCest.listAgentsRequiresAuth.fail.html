<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Login</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; background: #f5f5f5; }
        .login-box { background: #fff; padding: 2rem; border-radius: 6px; box-shadow: 0 2px 8px rgba(0,0,0,.12); width: 320px; }
        h1 { margin: 0 0 1.5rem; font-size: 1.4rem; }
        label { display: block; margin-bottom: .25rem; font-size: .9rem; }
        input { width: 100%; box-sizing: border-box; padding: .5rem; margin-bottom: 1rem; border: 1px solid #ccc; border-radius: 4px; }
        button { width: 100%; padding: .6rem; background: #333; color: #fff; border: none; border-radius: 4px; cursor: pointer; font-size: 1rem; }
        button:hover { background: #555; }
        .error { background: #fde8e8; border: 1px solid #f5c6c6; color: #c0392b; padding: .6rem; border-radius: 4px; margin-bottom: 1rem; font-size: .9rem; }
    </style>
</head>
<body>
    <div class="login-box">
        <h1>Admin Login</h1>

        
        <form method="post" action="/admin/login">
            <label for="username">Username</label>
            <input type="text" id="username" name="_username" value="" autocomplete="username" autofocus>

            <label for="password">Password</label>
            <input type="password" id="password" name="_password" autocomplete="current-password">

            <input type="hidden" name="_csrf_token" value="csrf-token">

            <button type="submit">Sign in</button>
        </form>
    </div>
</body>
</html>
