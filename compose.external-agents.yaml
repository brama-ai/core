# External Agent Compose Loader
#
# This file is auto-generated by `make external-agents-list` and maintained by operators.
# Each include block loads the compose fragment from a checked-out agent workspace under
# projects/<agent-name>/compose.fragment.yaml.
#
# To add an external agent:
#   1. Clone the agent repository into projects/<agent-name>/
#   2. Add an include block below pointing to its compose.fragment.yaml
#   3. Run: make external-agent-up name=<agent-name>
#
# To remove an external agent:
#   1. Run: make external-agent-down name=<agent-name>
#   2. Remove the include block below
#   3. Optionally delete the projects/<agent-name>/ directory
#
# See docs/guides/external-agents/en/operator-onboarding.md for the full workflow.

include:
  - path: projects/hello-agent/compose.fragment.yaml
    required: false
