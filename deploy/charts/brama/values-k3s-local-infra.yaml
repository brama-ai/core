# K3S Local Infrastructure Values
#
# Deploys only stateful infrastructure services (no application workloads).
# Used for local k3s validation and pre-production infra bring-up.
#
# Storage durability tiers:
#   Tier A (authoritative, back up before upgrade): PostgreSQL
#   Tier B (rebuildable from source): OpenSearch
#   Tier C (optional persistence): Redis, RabbitMQ
#
# All services use local-path storage class (k3s default for single-node).
# PVC baselines: Postgres 5Gi, Redis 1Gi, RabbitMQ 2Gi, OpenSearch 8Gi.

global:
  security:
    allowInsecureImages: true

core:
  enabled: false

coreScheduler:
  enabled: false

agents:
  knowledge:
    enabled: false
  hello:
    enabled: false
  newsMaker:
    enabled: false

litellm:
  enabled: false

website:
  enabled: true
  host: website.192.168.64.4.sslip.io

ingress:
  enabled: true
  className: traefik

migrations:
  enabled: false

# PostgreSQL — Tier A (authoritative)
# Backup required before upgrade. Data loss = permanent platform data loss.
# PVC: 5Gi local-path (local infra baseline; larger than dev for validation)
postgresql:
  enabled: true
  image:
    registry: docker.io
    repository: bitnamilegacy/postgresql
  primary:
    persistence:
      enabled: true
      storageClass: local-path
      size: 5Gi

# Redis — Tier C (cache/session state, no backup required)
# Loss impact: temporary cache miss or session reset only.
# PVC: 1Gi local-path
redis:
  enabled: true
  image:
    registry: docker.io
    repository: bitnamilegacy/redis
  master:
    persistence:
      enabled: true
      storageClass: local-path
      size: 1Gi

# RabbitMQ — Tier C (transient message delivery, no backup required)
# Loss impact: in-flight messages may be lost; producers re-enqueue.
# PVC: 2Gi local-path
rabbitmq:
  enabled: true
  image:
    registry: docker.io
    repository: bitnamilegacy/rabbitmq
  persistence:
    enabled: true
    storageClass: local-path
    size: 2Gi

# OpenSearch — Tier B (rebuildable from Postgres via re-indexing)
# Enabled in local infra profile for search/log validation.
# PVC: 8Gi local-path (same baseline for all environments where enabled)
opensearch:
  enabled: true
  extraEnvs:
    - name: plugins.security.disabled
      value: "true"
    - name: OPENSEARCH_INITIAL_ADMIN_PASSWORD
      value: "LocalAdmin123!"
  persistence:
    enabled: true
    storageClass: local-path
    size: 8Gi
