{{- if .Values.litellm.enabled -}}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "acp.fullname" . }}-litellm
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "acp.labels" . | nindent 4 }}
    app.kubernetes.io/component: litellm
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.litellm.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "acp.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: litellm
{{- end }}
