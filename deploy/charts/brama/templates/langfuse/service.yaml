{{- if .Values.langfuse.enabled -}}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "acp.fullname" . }}-langfuse
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "acp.labels" . | nindent 4 }}
    app.kubernetes.io/component: langfuse-web
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.langfuse.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "acp.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: langfuse-web
{{- end }}
