# Brama — Helm Chart Default Values
#
# This file documents every configurable value with safe defaults.
# For production, create a values-prod.yaml that overrides only what you need.
# Never commit secrets to values files — use secretRefs or external secret operators.

# ---------------------------------------------------------------------------
# Global image settings
# ---------------------------------------------------------------------------
global:
  # Image pull policy for all platform images.
  # Use IfNotPresent in production with pinned tags.
  imagePullPolicy: IfNotPresent

  # Optional: image pull secrets for private registries
  imagePullSecrets: []
  # - name: my-registry-secret

  # Namespace override (defaults to the release namespace)
  namespaceOverride: ""

# ---------------------------------------------------------------------------
# Core application service
# ---------------------------------------------------------------------------
core:
  enabled: true
  image:
    repository: ghcr.io/nmdimas/brama/brama-core
    # Pin to a specific release tag in production. Never use "latest".
    tag: "0.1.0"
    pullPolicy: IfNotPresent

  replicaCount: 1

  service:
    type: ClusterIP
    port: 80

  # Resource requests and limits
  resources:
    requests:
      cpu: 250m
      memory: 256Mi
    limits:
      cpu: 1000m
      memory: 512Mi

  # Readiness probe — gates traffic until the app is ready
  readinessProbe:
    httpGet:
      path: /health
      port: 80
    initialDelaySeconds: 10
    periodSeconds: 10
    failureThreshold: 3

  # Liveness probe — restarts the container if it becomes unhealthy
  livenessProbe:
    httpGet:
      path: /health
      port: 80
    initialDelaySeconds: 30
    periodSeconds: 30
    failureThreshold: 3

  # Startup probe — allows slow startup before liveness kicks in
  startupProbe:
    httpGet:
      path: /health
      port: 80
    initialDelaySeconds: 5
    periodSeconds: 5
    failureThreshold: 24

  # Environment variables injected into the core container.
  # Sensitive values should use secretRef entries below.
  env:
    APP_ENV: prod
    AGENT_DISCOVERY_PROVIDER: auto
    LANGFUSE_ENABLED: "true"
    EDGE_AUTH_COOKIE_NAME: ACP_EDGE_TOKEN
    EDGE_AUTH_TOKEN_TTL: "43200"

  # Reference an existing Kubernetes Secret for sensitive values.
  # The secret must contain keys matching the expected env var names.
  # Example keys: APP_SECRET, EDGE_AUTH_JWT_SECRET, DATABASE_URL,
  #               LANGFUSE_PUBLIC_KEY, LANGFUSE_SECRET_KEY
  secretRef: ""
  # secretRef: core-secrets

  # Persistence for any local file state (optional; prefer external storage)
  persistence:
    enabled: false
    storageClass: ""
    size: 1Gi

# ---------------------------------------------------------------------------
# Core scheduler (long-running worker)
# ---------------------------------------------------------------------------
coreScheduler:
  enabled: true

  image:
    repository: ghcr.io/nmdimas/brama/brama-core
    tag: "0.1.0"
    pullPolicy: IfNotPresent

  # Schedulers run as a single replica; horizontal scaling is not safe
  replicaCount: 1

  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi

  # Scheduler does not expose HTTP; use exec probe
  # Note: scheduler:status does not exist — use scheduler:run or disable probe
  livenessProbe: {}

# ---------------------------------------------------------------------------
# Agents
# Each agent can be enabled/disabled independently.
# ---------------------------------------------------------------------------
agents:
  knowledge:
    enabled: true
    image:
      repository: ghcr.io/nmdimas/brama/knowledge-agent
      tag: "0.1.0"
      pullPolicy: IfNotPresent
    replicaCount: 1
    service:
      port: 8083
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 256Mi
    readinessProbe:
      httpGet:
        path: /health
        port: 8083
      initialDelaySeconds: 10
      periodSeconds: 10
    livenessProbe:
      httpGet:
        path: /health
        port: 8083
      initialDelaySeconds: 30
      periodSeconds: 30
    secretRef: ""
    # Optional inline env vars (non-sensitive)
    env: {}

  hello:
    enabled: true
    image:
      repository: ghcr.io/nmdimas/brama/hello-agent
      tag: "0.1.0"
      pullPolicy: IfNotPresent
    replicaCount: 1
    service:
      port: 8085
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 250m
        memory: 128Mi
    readinessProbe:
      httpGet:
        path: /health
        port: 8085
      initialDelaySeconds: 10
      periodSeconds: 10
    livenessProbe:
      httpGet:
        path: /health
        port: 8085
      initialDelaySeconds: 30
      periodSeconds: 30
    secretRef: ""
    env: {}

  newsMaker:
    enabled: false
    image:
      repository: ghcr.io/nmdimas/brama/news-maker-agent
      tag: "0.1.0"
      pullPolicy: IfNotPresent
    replicaCount: 1
    service:
      port: 8087
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 256Mi
    readinessProbe:
      httpGet:
        path: /health
        port: 8087
      initialDelaySeconds: 10
      periodSeconds: 10
    livenessProbe:
      httpGet:
        path: /health
        port: 8087
      initialDelaySeconds: 30
      periodSeconds: 30
    secretRef: ""
    # Optional inline env vars (non-sensitive)
    env: {}

  wiki:
    enabled: false
    image:
      repository: ghcr.io/nmdimas/brama/wiki-agent
      tag: "0.1.0"
      pullPolicy: IfNotPresent
    replicaCount: 1
    service:
      port: 8089
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 250m
        memory: 128Mi
    readinessProbe:
      httpGet:
        path: /health
        port: 8089
      initialDelaySeconds: 10
      periodSeconds: 10
    livenessProbe:
      httpGet:
        path: /health
        port: 8089
      initialDelaySeconds: 30
      periodSeconds: 30
    secretRef: ""
    env: {}

  devReporter:
    enabled: false
    image:
      repository: ghcr.io/nmdimas/brama/dev-reporter-agent
      tag: "0.1.0"
      pullPolicy: IfNotPresent
    replicaCount: 1
    service:
      port: 8091
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 250m
        memory: 128Mi
    readinessProbe:
      httpGet:
        path: /health
        port: 8091
      initialDelaySeconds: 10
      periodSeconds: 10
    livenessProbe:
      httpGet:
        path: /health
        port: 8091
      initialDelaySeconds: 30
      periodSeconds: 30
    secretRef: ""
    env: {}

  devAgent:
    # dev-agent is heavy (git + gh CLI) — disabled by default
    enabled: false
    image:
      repository: ghcr.io/nmdimas/brama/dev-agent
      tag: "0.1.0"
      pullPolicy: IfNotPresent
    replicaCount: 1
    service:
      port: 8093
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 1000m
        memory: 512Mi
    readinessProbe:
      httpGet:
        path: /health
        port: 8093
      initialDelaySeconds: 15
      periodSeconds: 10
    livenessProbe:
      httpGet:
        path: /health
        port: 8093
      initialDelaySeconds: 30
      periodSeconds: 30
    secretRef: ""
    env: {}

# ---------------------------------------------------------------------------
# Knowledge worker (background message consumer)
# Shares the same image as knowledge-agent.
# Enabled automatically when agents.knowledge.enabled is true.
# ---------------------------------------------------------------------------
knowledgeWorker:
  enabled: true
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi

# ---------------------------------------------------------------------------
# LiteLLM proxy
# ---------------------------------------------------------------------------
litellm:
  enabled: true
  image:
    repository: ghcr.io/berriai/litellm
    tag: "main-latest"
    pullPolicy: IfNotPresent
  replicaCount: 1
  service:
    port: 4000
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
  readinessProbe:
    httpGet:
      path: /health
      port: 4000
    initialDelaySeconds: 15
    periodSeconds: 10
  livenessProbe:
    httpGet:
      path: /health
      port: 4000
    initialDelaySeconds: 30
    periodSeconds: 30
  # Reference a secret containing: LITELLM_MASTER_KEY, DATABASE_URL,
  # LANGFUSE_PUBLIC_KEY, LANGFUSE_SECRET_KEY, OPENROUTER_API_KEY
  secretRef: ""
  # Path to the LiteLLM config file mounted as a ConfigMap
  configMapRef: ""

# ---------------------------------------------------------------------------
# Website landing stub
# ---------------------------------------------------------------------------
website:
  enabled: false
  image:
    repository: python
    tag: "3.12-alpine"
    pullPolicy: IfNotPresent
  replicaCount: 1
  containerPort: 8080
  service:
    type: ClusterIP
    port: 80
  host: website.localhost
  resources:
    requests:
      cpu: 25m
      memory: 32Mi
    limits:
      cpu: 100m
      memory: 128Mi

# ---------------------------------------------------------------------------
# OpenClaw — Telegram gateway (optional)
# ---------------------------------------------------------------------------
openclaw:
  enabled: false
  image:
    repository: ghcr.io/nmdimas/brama/openclaw
    tag: "0.1.0"
    pullPolicy: IfNotPresent
  replicaCount: 1
  service:
    port: 8080
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 250m
      memory: 128Mi
  readinessProbe: {}
  livenessProbe: {}
  secretRef: ""

# ---------------------------------------------------------------------------
# Langfuse — LLM observability (optional)
# ---------------------------------------------------------------------------
langfuse:
  enabled: false
  replicaCount: 1
  service:
    port: 3000
  secretRef: ""
  web:
    image:
      repository: langfuse/langfuse
      tag: "2"
      pullPolicy: IfNotPresent
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 256Mi
  worker:
    image:
      repository: langfuse/langfuse-worker
      tag: "2"
      pullPolicy: IfNotPresent
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 256Mi
  # Optional: inline LiteLLM-style config (not used by Langfuse directly)
  config: ""

# ---------------------------------------------------------------------------
# Ingress
# ---------------------------------------------------------------------------
ingress:
  enabled: true
  className: nginx
  # TLS is strongly recommended in production
  tls:
    enabled: false
    secretName: acp-tls
  annotations: {}
  # kubernetes.io/ingress.class: nginx
  # cert-manager.io/cluster-issuer: letsencrypt-prod

  hosts:
    core: platform.example.com
    langfuse: langfuse.example.com
    litellm: litellm.example.com
    openclaw: openclaw.example.com

# ---------------------------------------------------------------------------
# External dependency endpoints
# Set these when using managed/external services instead of bundled sub-charts.
# ---------------------------------------------------------------------------
externalDependencies:
  # PostgreSQL
  postgres:
    # When true, the bundled postgresql sub-chart is disabled and this host is used
    external: false
    host: ""
    port: 5432
    database: ai_community_platform
    # Credentials should come from a secretRef, not plain values

  # Redis
  redis:
    external: false
    host: ""
    port: 6379

  # OpenSearch (optional; used for structured logs)
  opensearch:
    external: false
    host: ""
    port: 9200

  # RabbitMQ (optional; used by some agents)
  rabbitmq:
    external: false
    host: ""
    port: 5672

# ---------------------------------------------------------------------------
# Bundled sub-chart toggles
# Disable these when using external managed services.
#
# Storage durability tiers (k3s storage architecture):
#   Tier A — authoritative, must back up before upgrade:
#     PostgreSQL (core + agent databases)
#   Tier B — recommended to persist, rebuildable from source if lost:
#     OpenSearch (indices rebuildable from Postgres via re-indexing)
#     Langfuse stateful dependencies (when observability history matters)
#   Tier C — persistence optional or environment-dependent:
#     Redis (cache/session state; loss causes temporary degradation only)
#     RabbitMQ (transient message delivery; in-flight messages may be lost)
#     Local container registry (images can be rebuilt)
#
# PVC baseline sizes (single-node k3s):
#   Service      | Local Dev | Production | Tier
#   -------------|-----------|------------|------
#   PostgreSQL   | 2 Gi      | 10 Gi      | A
#   Redis        | 1 Gi      | 2 Gi       | C
#   RabbitMQ     | 1 Gi      | 2 Gi       | C
#   OpenSearch   | 8 Gi      | 8 Gi       | B
#
# All single-node k3s environments use the `local-path` storage class.
# For production with managed services, set externalDependencies.*.external: true
# and disable the corresponding sub-chart.
# ---------------------------------------------------------------------------

# ---------------------------------------------------------------------------
# PostgreSQL — Tier A (authoritative, must back up)
# Data: platform and agent relational state (source of truth)
# Backup: required before every upgrade (pg_dump)
# Restore: documented restore path with post-restore verification
# Loss impact: permanent data loss; platform cannot function without restore
# Externalization: set externalDependencies.postgres.external: true to use
#   a managed PostgreSQL instance (RDS, Cloud SQL, Hetzner Managed DB, etc.)
# ---------------------------------------------------------------------------
postgresql:
  enabled: true
  architecture: standalone
  auth:
    database: ai_community_platform
    username: app
    # Use a secret in production — do not set password here
    existingSecret: ""
    secretKeys:
      adminPasswordKey: postgres-password
      userPasswordKey: password
  primary:
    persistence:
      enabled: true
      storageClass: ""
      size: 10Gi

# ---------------------------------------------------------------------------
# Redis — Tier C (persistence optional, cache/session state only)
# Data: session tokens, cache entries, transient workflow state
# Backup: not required for cache-only usage
# Loss impact: temporary cache miss or session reset; no permanent data loss
# Recovery: application reconnects automatically; users may need to re-login
# Externalization: set externalDependencies.redis.external: true to use
#   a managed Redis instance (ElastiCache, Memorystore, Upstash, etc.)
# ---------------------------------------------------------------------------
redis:
  enabled: true
  auth:
    enabled: false
  master:
    persistence:
      enabled: true
      storageClass: ""
      size: 2Gi

# ---------------------------------------------------------------------------
# OpenSearch — Tier B (recommended to persist, rebuildable from Postgres)
# Data: search indices, structured logs
# Backup: optional; snapshot recommended for large index volumes
# Loss impact: search/log data unavailable until re-indexed from Postgres
# Recovery: re-index from Postgres using platform re-indexing commands
# Note: disabled by default; enable when search or log features are needed
# ---------------------------------------------------------------------------
opensearch:
  enabled: false
  replicas: 1
  singleNode: true
  extraEnvs:
    - name: plugins.security.disabled
      value: "true"
  opensearchJavaOpts: "-Xms512m -Xmx512m"
  persistence:
    enabled: true
    storageClass: ""
    size: 8Gi
  resources:
    requests:
      cpu: 100m
      memory: 768Mi
    limits:
      cpu: 1000m
      memory: 1536Mi
  service:
    ports:
      http: 9200

# ---------------------------------------------------------------------------
# RabbitMQ — Tier C (persistence optional, transient message delivery)
# Data: message queues for agent task delivery
# Backup: not required; queues are transient
# Loss impact: in-flight messages may be lost on pod restart or node loss
# Recovery: producers re-enqueue; consumers reconnect automatically
# Note: disabled by default; enable when agent messaging is required
# ---------------------------------------------------------------------------
rabbitmq:
  enabled: false
  auth:
    username: app
    password: app
    existingPasswordSecret: ""
  persistence:
    enabled: true
    storageClass: ""
    size: 2Gi
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

# ---------------------------------------------------------------------------
# Migration job
# Runs as a Helm pre-upgrade / post-install hook.
# ---------------------------------------------------------------------------
migrations:
  # When true, a Job is created to run database migrations before app rollout
  enabled: true
  image:
    repository: ghcr.io/nmdimas/brama/brama-core
    tag: "0.1.0"
    pullPolicy: IfNotPresent
  # Hook annotations control when the job runs relative to the release lifecycle
  hookAnnotations:
    "helm.sh/hook": pre-upgrade,post-install
    "helm.sh/hook-weight": "-5"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi
  # Reference the same secret as core for DATABASE_URL access
  secretRef: ""

# ---------------------------------------------------------------------------
# Service account
# ---------------------------------------------------------------------------
serviceAccount:
  create: true
  name: ""
  annotations: {}

# ---------------------------------------------------------------------------
# Pod security context
# ---------------------------------------------------------------------------
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  fsGroup: 1000

# ---------------------------------------------------------------------------
# Node scheduling
# ---------------------------------------------------------------------------
nodeSelector: {}
tolerations: []
affinity: {}

# ---------------------------------------------------------------------------
# Extra labels applied to all resources
# ---------------------------------------------------------------------------
commonLabels: {}
