# Brama — Production Values Example
#
# Copy this file to values-prod.yaml and fill in your environment-specific values.
# Never commit values-prod.yaml to version control — it contains references to secrets.
#
# Usage:
#   helm upgrade --install brama ./deploy/charts/brama \
#     -n brama --create-namespace \
#     -f deploy/charts/brama/values-prod.example.yaml \
#     -f values-prod.yaml \
#     --wait --timeout 15m

# ---------------------------------------------------------------------------
# Image tags — pin to a specific release in production
# ---------------------------------------------------------------------------
core:
  image:
    tag: "0.1.0"  # Replace with the target release tag

  replicaCount: 1

  env:
    APP_ENV: prod
    LANGFUSE_ENABLED: "true"
    LANGFUSE_BASE_URL: "https://langfuse.example.com"
    EDGE_AUTH_COOKIE_NAME: ACP_EDGE_TOKEN
    EDGE_AUTH_TOKEN_TTL: "43200"
    EDGE_AUTH_LOGIN_BASE_URL: "https://platform.example.com"
    EDGE_AUTH_COOKIE_DOMAIN: ".example.com"
    # Cloudflare Turnstile CAPTCHA — enable in production to protect the edge auth login form.
    # Obtain keys from https://dash.cloudflare.com/ → Turnstile.
    # TURNSTILE_SITE_KEY and TURNSTILE_SECRET_KEY must be stored in the Kubernetes secret (secretRef).
    TURNSTILE_ENABLED: "true"

  # Name of the Kubernetes Secret containing:
  #   APP_SECRET, EDGE_AUTH_JWT_SECRET, DATABASE_URL,
  #   LANGFUSE_PUBLIC_KEY, LANGFUSE_SECRET_KEY,
  #   TURNSTILE_SITE_KEY, TURNSTILE_SECRET_KEY
  secretRef: core-secrets

coreScheduler:
  enabled: true
  image:
    tag: "0.1.0"

# ---------------------------------------------------------------------------
# Agents — enable only what you deploy
# ---------------------------------------------------------------------------
agents:
  knowledge:
    enabled: true
    image:
      tag: "0.1.0"
    secretRef: knowledge-agent-secrets

  hello:
    enabled: true
    image:
      tag: "0.1.0"
    secretRef: hello-agent-secrets

  newsMaker:
    enabled: false

# ---------------------------------------------------------------------------
# LiteLLM
# ---------------------------------------------------------------------------
litellm:
  enabled: true
  image:
    tag: "main-stable"  # Pin to a stable tag in production
  secretRef: litellm-secrets
  configMapRef: litellm-config

# ---------------------------------------------------------------------------
# Ingress
# ---------------------------------------------------------------------------
ingress:
  enabled: true
  className: nginx
  tls:
    enabled: true
    secretName: acp-tls
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
  hosts:
    core: platform.example.com
    langfuse: langfuse.example.com
    litellm: litellm.example.com
    openclaw: openclaw.example.com

# ---------------------------------------------------------------------------
# External managed services (recommended for production Kubernetes)
#
# Storage durability tiers for production:
#   Tier A (authoritative, must back up): PostgreSQL
#     → Use managed PostgreSQL (RDS, Cloud SQL, Hetzner Managed DB) for
#       production. Set external: true and disable the bundled sub-chart.
#     → If using bundled sub-chart on single-node k3s: PVC 10Gi local-path.
#     → Backup: pg_dump before every upgrade. See k3s-storage-backup.md.
#   Tier B (rebuildable from source): OpenSearch
#     → Indices can be rebuilt from Postgres via re-indexing if lost.
#     → Snapshot recommended for large volumes.
#   Tier C (optional persistence): Redis, RabbitMQ
#     → Use managed Redis (ElastiCache, Memorystore, Upstash) for production.
#     → Redis loss: temporary cache miss or session reset only.
#     → RabbitMQ loss: in-flight messages may be lost; producers re-enqueue.
#
# Externalization path:
#   Setting external: true disables the bundled sub-chart and routes the
#   application to the specified host. No in-cluster PVC is created.
#   This pattern ensures storage decisions do not prevent future migration
#   to managed services.
# ---------------------------------------------------------------------------
externalDependencies:
  # PostgreSQL — Tier A (authoritative, must back up before upgrade)
  # Recommended: use a managed PostgreSQL service in production.
  # Backup: pg_dump before every upgrade (see k3s-storage-backup.md).
  postgres:
    external: true
    host: postgres.example.com
    port: 5432
    database: ai_community_platform

  # Redis — Tier C (cache/session state, no backup required)
  # Recommended: use a managed Redis service in production.
  # Loss impact: temporary cache miss or session reset only.
  redis:
    external: true
    host: redis.example.com
    port: 6379

# Disable bundled sub-charts when using external managed services
# PostgreSQL — Tier A: disable when using externalDependencies.postgres
postgresql:
  enabled: false

# Redis — Tier C: disable when using externalDependencies.redis
redis:
  enabled: false

# ---------------------------------------------------------------------------
# Migrations
# ---------------------------------------------------------------------------
migrations:
  enabled: true
  image:
    tag: "0.1.0"
  secretRef: core-secrets

# ---------------------------------------------------------------------------
# Resource tuning for production
# ---------------------------------------------------------------------------
# Adjust based on your cluster capacity and observed usage.
# Start with these conservative values and tune after observing metrics.

# core.resources, agents.*.resources, etc. can be overridden here.
# Example:
# core:
#   resources:
#     requests:
#       cpu: 500m
#       memory: 512Mi
#     limits:
#       cpu: 2000m
#       memory: 1Gi
